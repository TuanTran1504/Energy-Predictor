version: "3.9"

services:

  # ── Reverse proxy — only service exposed to the internet ──
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      go-backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  # ── React frontend (Vite build served by nginx) ───────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  # ── Go API gateway ────────────────────────────────────────
  go-backend:
    build:
      context: ./go-backend
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      PYTHON_ML_URL: "http://ml-service:8001"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - ml-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Python ML inference service ───────────────────────────
  ml-service:
    build:
      context: ./backend/training
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BINANCE_FUTURES_API_KEY: ${BINANCE_FUTURES_API_KEY}
      BINANCE_FUTURES_SECRET_KEY: ${BINANCE_FUTURES_SECRET_KEY}
    depends_on:
      - redis
    restart: unless-stopped

  # ── LLM trading engine (4h decision cycle) ────────────────
  trading-engine:
    build:
      context: .
      dockerfile: backend/trading/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BINANCE_FUTURES_API_KEY: ${BINANCE_FUTURES_API_KEY}
      BINANCE_FUTURES_SECRET_KEY: ${BINANCE_FUTURES_SECRET_KEY}
    depends_on:
      - ml-service
      - redis
    restart: unless-stopped

  # ── Data scheduler (Fear&Greed, FRED, funding rates) ─────
  scheduler:
    build:
      context: ./backend/schedule
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FRED_API_KEY: ${FRED_API_KEY:-}
    depends_on:
      - redis
    restart: unless-stopped

  # ── Redis cache ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
