version: "3.9"

services:

  # ── Reverse proxy — only service exposed to the internet ──
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      go-backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  # ── React frontend (Vite build served by nginx) ───────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  # ── Go API gateway ────────────────────────────────────────
  go-backend:
    build:
      context: ./go-backend
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      PYTHON_ML_URL: "http://ml-service:8001"
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      - ml-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Python ML inference service ───────────────────────────
  ml-service:
    build:
      context: ./backend/training
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      FEATURE_TRAIN_TIMEFRAME: ${FEATURE_TRAIN_TIMEFRAME:-4H}
      MODEL_HORIZONS: ${MODEL_HORIZONS:-4h,1d}
      ML_FEATURE_SET: ${ML_FEATURE_SET:-full}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME}
      MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BINANCE_FUTURES_API_KEY: ${BINANCE_FUTURES_API_KEY}
      BINANCE_FUTURES_SECRET_KEY: ${BINANCE_FUTURES_SECRET_KEY}
      # Threshold to call UP — BTC raised to 0.55 to counteract UP bias
      BTC_UP_THRESHOLD: ${BTC_UP_THRESHOLD:-0.55}
      ETH_UP_THRESHOLD: ${ETH_UP_THRESHOLD:-0.50}
      # Fallback FED rate for candle-only inference (no DB access)
      FED_RATE_DEFAULT: ${FED_RATE_DEFAULT:-5.25}
      MLFLOW_REGISTER_MODELS: ${MLFLOW_REGISTER_MODELS:-true}
      SHADOW_TRAIN: ${SHADOW_TRAIN:-false}
    depends_on:
      - redis
    restart: unless-stopped

  # ── LLM trading engine (5-min decision cycle) ────────────────
  trading-engine:
    build:
      context: .
      dockerfile: backend/trading/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ML_HORIZONS: ${ML_HORIZONS:-4h,1d}
      ML_PRIMARY_HORIZON: ${ML_PRIMARY_HORIZON:-4h}
      ML_TREND_HORIZON: ${ML_TREND_HORIZON:-1d}
      ML_REQUIRE_TREND_ALIGNMENT: ${ML_REQUIRE_TREND_ALIGNMENT:-1}
      TRADE_MIN_RR: ${TRADE_MIN_RR:-1.5}
      TRADE_MIN_RR_RANGE: ${TRADE_MIN_RR_RANGE:-1.5}
      SETUP_E_MIN_RR: ${SETUP_E_MIN_RR:-1.0}
      TECH_ALLOW_SIDEWAY: ${TECH_ALLOW_SIDEWAY:-0}
      TECH_SCORE_THRESHOLD: ${TECH_SCORE_THRESHOLD:-3}
      TECH_SCORE_THRESHOLD_RANGE: ${TECH_SCORE_THRESHOLD_RANGE:-3}
      TECH_SCORE_THRESHOLD_NON_BTC_HIGH_ADX: ${TECH_SCORE_THRESHOLD_NON_BTC_HIGH_ADX:-2}
      TECH_ADX_RELAX_LEVEL: ${TECH_ADX_RELAX_LEVEL:-45}
      TECH_ROLLOVER_SCORE_THRESHOLD: ${TECH_ROLLOVER_SCORE_THRESHOLD:-1}
      SETUP_C_RELAXED: ${SETUP_C_RELAXED:-0}
      SETUP_C_SOFT_BODY_RATIO: ${SETUP_C_SOFT_BODY_RATIO:-0.45}
      SETUP_C_VOLUME_MULT: ${SETUP_C_VOLUME_MULT:-1.10}
      SETUP_C_FAKE_MOVE_ATR_MULT: ${SETUP_C_FAKE_MOVE_ATR_MULT:-0.35}
      SL_ATR_DYNAMIC_MULT: ${SL_ATR_DYNAMIC_MULT:-3.0}
      SL_MAX_PCT_CEILING: ${SL_MAX_PCT_CEILING:-0.04}
      SL_MAX_PCT: ${SL_MAX_PCT:-0.008}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      BINANCE_FUTURES_API_KEY: ${BINANCE_FUTURES_API_KEY}
      BINANCE_FUTURES_SECRET_KEY: ${BINANCE_FUTURES_SECRET_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - trading-logs:/app/logs
    depends_on:
      - ml-service
      - redis
    restart: unless-stopped

  # ── Live account engine (BTC/ETH/SOL — real Binance, not testnet) ──────
  trading-engine-live:
    build:
      context: .
      dockerfile: backend/trading/Dockerfile
    command: python engine_live.py --loop
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ML_HORIZONS: ${ML_HORIZONS:-4h,1d}
      ML_PRIMARY_HORIZON: ${ML_PRIMARY_HORIZON:-4h}
      ML_TREND_HORIZON: ${ML_TREND_HORIZON:-1d}
      ML_REQUIRE_TREND_ALIGNMENT: ${ML_REQUIRE_TREND_ALIGNMENT:-1}
      TRADE_MIN_RR: ${TRADE_MIN_RR:-1.5}
      TRADE_MIN_RR_RANGE: ${TRADE_MIN_RR_RANGE:-1.5}
      SETUP_E_MIN_RR: ${SETUP_E_MIN_RR:-1.0}
      TECH_ALLOW_SIDEWAY: ${TECH_ALLOW_SIDEWAY:-0}
      TECH_SCORE_THRESHOLD: ${TECH_SCORE_THRESHOLD:-3}
      TECH_SCORE_THRESHOLD_RANGE: ${TECH_SCORE_THRESHOLD_RANGE:-3}
      TECH_SCORE_THRESHOLD_NON_BTC_HIGH_ADX: ${TECH_SCORE_THRESHOLD_NON_BTC_HIGH_ADX:-2}
      TECH_ADX_RELAX_LEVEL: ${TECH_ADX_RELAX_LEVEL:-45}
      TECH_ROLLOVER_SCORE_THRESHOLD: ${TECH_ROLLOVER_SCORE_THRESHOLD:-1}
      SETUP_C_RELAXED: ${SETUP_C_RELAXED:-0}
      SETUP_C_SOFT_BODY_RATIO: ${SETUP_C_SOFT_BODY_RATIO:-0.45}
      SETUP_C_VOLUME_MULT: ${SETUP_C_VOLUME_MULT:-1.10}
      SETUP_C_FAKE_MOVE_ATR_MULT: ${SETUP_C_FAKE_MOVE_ATR_MULT:-0.35}
      SL_ATR_DYNAMIC_MULT: ${SL_ATR_DYNAMIC_MULT:-3.0}
      SL_MAX_PCT_CEILING: ${SL_MAX_PCT_CEILING:-0.04}
      SL_MAX_PCT: ${SL_MAX_PCT:-0.008}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      BINANCE_LIVE_API_KEY: ${BINANCE_LIVE_API_KEY}
      BINANCE_LIVE_SECRET_KEY: ${BINANCE_LIVE_SECRET_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    volumes:
      - trading-logs-live:/app/logs
    depends_on:
      - ml-service
      - redis
    restart: unless-stopped

  # ── Data scheduler (Fear&Greed, FRED, funding rates, macro_releases) ──
  scheduler:
    build:
      context: ./backend/schedule
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FRED_API_KEY: ${FRED_API_KEY:-}
      # Optional: plug in a calendar API for forward-looking macro events
      ECON_CALENDAR_URL: ${ECON_CALENDAR_URL:-}
      ECON_CALENDAR_API_KEY: ${ECON_CALENDAR_API_KEY:-}
      # Optional: ETF flow data source
      ETF_FLOW_API_URL: ${ETF_FLOW_API_URL:-}
      ETF_FLOW_API_KEY: ${ETF_FLOW_API_KEY:-}
    depends_on:
      - redis
    restart: unless-stopped

  # ── Redis cache ───────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: backend/telegram/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    depends_on:
      - go-backend
    restart: unless-stopped

volumes:
  redis_data:
  trading-logs:
  trading-logs-live:
