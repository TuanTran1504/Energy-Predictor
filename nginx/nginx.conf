events {}

http {
    # ── Frontend ──────────────────────────────────────────────
    upstream frontend  { server frontend:80; }

    # ── Go API gateway ────────────────────────────────────────
    upstream go_backend { server go-backend:8080; }

    server {
        listen 80;
        server_name _;

        # Redirect all HTTP → HTTPS in production
        # Uncomment once SSL certs are in place:
        # return 301 https://$host$request_uri;

        # ── API requests → Go backend ──────────────────────────
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass         http://go_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── WebSocket ──────────────────────────────────────────
        location /ws/ {
            proxy_pass         http://go_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "Upgrade";
            proxy_set_header   Host $host;
        }

        # ── Everything else → React SPA ───────────────────────
        location / {
            proxy_pass http://frontend;
        }
    }

    # ── HTTPS server (uncomment when SSL ready) ───────────────
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #
    #     location /api/ {
    #         rewrite ^/api/(.*) /$1 break;
    #         proxy_pass http://go_backend;
    #     }
    #
    #     location /ws/ {
    #         proxy_pass         http://go_backend;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Upgrade $http_upgrade;
    #         proxy_set_header   Connection "Upgrade";
    #     }
    #
    #     location / {
    #         proxy_pass http://frontend;
    #     }
    # }
}
